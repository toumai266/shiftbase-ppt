<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">AI 비서 시스템 구조 지도</title>
  <desc id="desc">AI 비서가 메시지 채널, 런타임, 업무 도구, 사람 승인 기준으로 구성되는 구조</desc>
  <rect width="1200" height="680" rx="34" fill="#f8fafc"/>
  <rect x="44" y="44" width="1112" height="592" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="78" y="102" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2563eb">AI ASSISTANT SYSTEM MAP</text>
  <text x="78" y="144" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#0f172a">봇이 아니라 운영 구조를 만든다</text>
  <text x="78" y="178" font-family="Arial, sans-serif" font-size="16" fill="#475569">첫 비서는 실행자가 아니라 읽기, 요약, 초안, 확인 질문을 맡는 제한된 운영자다.</text>

  <g font-family="Arial, sans-serif">
    <rect x="78" y="242" width="220" height="176" rx="20" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="104" y="282" font-size="21" font-weight="900" fill="#1e3a8a">1. 호출 채널</text>
    <text x="104" y="318" font-size="15" fill="#334155">Telegram DM</text>
    <text x="104" y="348" font-size="15" fill="#334155">Discord DM / 서버 채널</text>
    <text x="104" y="378" font-size="15" fill="#334155">허용 사용자, pairing</text>

    <rect x="356" y="242" width="220" height="176" rx="20" fill="#f0fdf4" stroke="#86efac"/>
    <text x="382" y="282" font-size="21" font-weight="900" fill="#166534">2. Agent runtime</text>
    <text x="382" y="318" font-size="15" fill="#334155">Hermes 또는 OpenClaw</text>
    <text x="382" y="348" font-size="15" fill="#334155">gateway start/status</text>
    <text x="382" y="378" font-size="15" fill="#334155">모델 provider 설정</text>

    <rect x="634" y="242" width="220" height="176" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="660" y="282" font-size="21" font-weight="900" fill="#9a3412">3. 업무 입력</text>
    <text x="660" y="318" font-size="15" fill="#334155">Gmail 읽기 전용</text>
    <text x="660" y="348" font-size="15" fill="#334155">Google Calendar 조회</text>
    <text x="660" y="378" font-size="15" fill="#334155">메모, 할 일, 파일 후보</text>

    <rect x="912" y="242" width="220" height="176" rx="20" fill="#fef2f2" stroke="#fecaca"/>
    <text x="938" y="282" font-size="21" font-weight="900" fill="#991b1b">4. 사람 승인</text>
    <text x="938" y="318" font-size="15" fill="#334155">자동 발송 금지</text>
    <text x="938" y="348" font-size="15" fill="#334155">삭제, 결제, 초대 금지</text>
    <text x="938" y="378" font-size="15" fill="#334155">민감 원문 외부 전송 금지</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M300 330h54"/>
    <path d="M578 330h54"/>
    <path d="M856 330h54"/>
  </g>
  <g fill="#94a3b8">
    <path d="M350 322l12 8-12 8z"/>
    <path d="M628 322l12 8-12 8z"/>
    <path d="M906 322l12 8-12 8z"/>
  </g>

  <rect x="78" y="486" width="1054" height="78" rx="20" fill="#0f172a"/>
  <text x="110" y="530" font-family="Arial, sans-serif" font-size="20" font-weight="900" fill="#ffffff">첫 성공 기준</text>
  <text x="248" y="530" font-family="Arial, sans-serif" font-size="18" fill="#dbeafe">아침 8시에 오늘 먼저 볼 일, 답장 필요, 일정 압박, 확인 필요를 5줄 안에 받는다.</text>
</svg>
