<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">AI 프롬프트 운영체계 만들기 요청 구조 웹북 비주얼</title>
  <desc id="desc">공개 AI 활용법을 한국 업무 산출물로 바꾸는 고품질 SVG 인포그래픽</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="520" rx="32" fill="#f8fafc"/>
  <rect x="36" y="34" width="888" height="452" rx="28" fill="url(#paper)" filter="url(#shadow)"/>
  <text x="72" y="86" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" font-weight="900" letter-spacing="1.8" fill="#15803d">SHIFTBASE AI WEBBOOK</text>
  <text x="72" y="128" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="850" fill="#0f2415">요청 구조</text>
  <foreignObject x="72" y="150" width="660" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font: 15px/1.55 system-ui, -apple-system, Segoe UI, sans-serif; color:#475569;">매번 다른 표현으로 AI에게 부탁하다가 결과 품질이 들쑥날쑥해진 팀의 공통 프롬프트 정비 시간</div>
  </foreignObject>
  <g transform="translate(72 238)">
    <g>
        <rect x="0" y="0" width="170" height="132" rx="18" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
        <circle cx="28" cy="30" r="15" fill="#15803d"/>
        <text x="28" y="35" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">1</text>
        <text x="24" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#0f2415">공개 자료</text>
        <foreignObject x="24" y="84" width="120" height="34">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font: 12px/1.4 system-ui, -apple-system, Segoe UI, sans-serif; color:#64748b;">업무 목적, 대상 독자, 참고 자료, 원하는 말투, 금지 표현</div>
        </foreignObject>
      </g><g>
        <rect x="208" y="0" width="170" height="132" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
        <circle cx="236" cy="30" r="15" fill="#0f2415"/>
        <text x="236" y="35" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">2</text>
        <text x="232" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#0f2415">업무 번역</text>
        <foreignObject x="232" y="84" width="120" height="34">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font: 12px/1.4 system-ui, -apple-system, Segoe UI, sans-serif; color:#64748b;">상사에게 공유할 결과물은 '빠르게'보다 '검토 가능한 형식'과 '책임 표현...</div>
        </foreignObject>
      </g><g>
        <rect x="416" y="0" width="170" height="132" rx="18" fill="#ffffff" stroke="#15803d" stroke-width="2"/>
        <circle cx="444" cy="30" r="15" fill="#15803d"/>
        <text x="444" y="35" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">3</text>
        <text x="440" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#0f2415">AI 요청</text>
        <foreignObject x="440" y="84" width="120" height="34">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font: 12px/1.4 system-ui, -apple-system, Segoe UI, sans-serif; color:#64748b;">목표, 맥락, 형식</div>
        </foreignObject>
      </g><g>
        <rect x="624" y="0" width="170" height="132" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
        <circle cx="652" cy="30" r="15" fill="#0f2415"/>
        <text x="652" y="35" text-anchor="middle" font-size="15" font-weight="900" fill="#ffffff">4</text>
        <text x="648" y="70" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="20" font-weight="850" fill="#0f2415">사람 검토</text>
        <foreignObject x="648" y="84" width="120" height="34">
          <div xmlns="http://www.w3.org/1999/xhtml" style="font: 12px/1.4 system-ui, -apple-system, Segoe UI, sans-serif; color:#64748b;">승인선과 책임</div>
        </foreignObject>
      </g>
  </g>
  <rect x="72" y="408" width="816" height="44" rx="16" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="98" y="436" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="850" fill="#0f2415">완성 산출물</text>
  <text x="224" y="436" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="750" fill="#15803d">업무 프롬프트 카드</text>
</svg>
