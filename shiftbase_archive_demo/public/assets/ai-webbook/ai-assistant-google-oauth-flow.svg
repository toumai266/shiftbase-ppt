<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Google OAuth Gmail Calendar 연결 흐름</title>
  <desc id="desc">Google Cloud에서 Gmail API와 Calendar API를 읽기 전용으로 준비하는 흐름</desc>
  <rect width="1200" height="680" rx="34" fill="#f8fafc"/>
  <rect x="48" y="44" width="1104" height="592" rx="28" fill="#ffffff" stroke="#dbe3ef"/>
  <text x="82" y="96" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#2563eb">GOOGLE WORKSPACE API</text>
  <text x="82" y="138" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#0f172a">Gmail과 Calendar는 읽기 전용으로 시작한다</text>

  <g font-family="Arial, sans-serif">
    <rect x="82" y="214" width="188" height="188" rx="22" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="110" y="260" font-size="19" font-weight="900" fill="#1e3a8a">1. Project</text>
    <text x="110" y="302" font-size="15" fill="#334155">Google Cloud</text>
    <text x="110" y="332" font-size="15" fill="#334155">새 프로젝트 생성</text>

    <rect x="314" y="214" width="188" height="188" rx="22" fill="#f0fdf4" stroke="#86efac"/>
    <text x="342" y="260" font-size="19" font-weight="900" fill="#166534">2. API enable</text>
    <text x="342" y="302" font-size="15" fill="#334155">Gmail API</text>
    <text x="342" y="332" font-size="15" fill="#334155">Calendar API</text>

    <rect x="546" y="214" width="188" height="188" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="574" y="260" font-size="19" font-weight="900" fill="#9a3412">3. OAuth</text>
    <text x="574" y="302" font-size="15" fill="#334155">동의 화면 구성</text>
    <text x="574" y="332" font-size="15" fill="#334155">테스트 사용자</text>

    <rect x="778" y="214" width="188" height="188" rx="22" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="806" y="260" font-size="19" font-weight="900" fill="#0f172a">4. Credential</text>
    <text x="806" y="302" font-size="15" fill="#334155">Desktop app</text>
    <text x="806" y="332" font-size="15" fill="#334155">credentials.json</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M272 308h40"/>
    <path d="M504 308h40"/>
    <path d="M736 308h40"/>
  </g>
  <g fill="#94a3b8">
    <path d="M308 300l12 8-12 8z"/>
    <path d="M540 300l12 8-12 8z"/>
    <path d="M772 300l12 8-12 8z"/>
  </g>

  <rect x="82" y="468" width="466" height="76" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="112" y="500" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0f172a">Gmail에서 가져올 것</text>
  <text x="112" y="528" font-family="Arial, sans-serif" font-size="15" fill="#334155">제목, 발신자, 수신 시각, 일부 본문, 확인 필요 표시</text>

  <rect x="594" y="468" width="466" height="76" rx="18" fill="#f8fafc" stroke="#dbe3ef"/>
  <text x="624" y="500" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0f172a">Calendar에서 가져올 것</text>
  <text x="624" y="528" font-family="Arial, sans-serif" font-size="15" fill="#334155">오늘·내일 일정 제목, 시간, 참석 여부, 준비 필요 항목</text>

  <text x="82" y="596" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#991b1b">금지:</text>
  <text x="134" y="596" font-family="Arial, sans-serif" font-size="16" fill="#334155">메일 원문, 첨부파일, 회의 링크, 참석자 전체 목록을 Telegram·Discord로 그대로 보내지 않는다.</text>
</svg>
