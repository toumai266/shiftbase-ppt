<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Discord Developer Portal 연결 흐름</title>
  <desc id="desc">Discord 앱 생성, 봇 토큰, intent, OAuth2 초대 권한 연결 흐름</desc>
  <rect width="1200" height="680" rx="34" fill="#f8fafc"/>
  <text x="72" y="86" font-family="Arial, sans-serif" font-size="18" font-weight="800" fill="#4f46e5">DISCORD SETUP</text>
  <text x="72" y="128" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#0f172a">Developer Portal에서 팀 채널 비서 만들기</text>
  <text x="72" y="164" font-family="Arial, sans-serif" font-size="16" fill="#475569">Discord는 Application, Bot, Intent, OAuth2 초대 권한을 나눠서 봐야 한다.</text>

  <g font-family="Arial, sans-serif">
    <rect x="72" y="226" width="246" height="160" rx="22" fill="#eef2ff" stroke="#a5b4fc"/>
    <text x="104" y="270" font-size="20" font-weight="900" fill="#3730a3">1. Application</text>
    <text x="104" y="310" font-size="15" fill="#334155">새 app 생성</text>
    <text x="104" y="338" font-size="15" fill="#334155">Application ID 복사</text>

    <rect x="374" y="226" width="246" height="160" rx="22" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="406" y="270" font-size="20" font-weight="900" fill="#0f172a">2. Bot</text>
    <text x="406" y="310" font-size="15" fill="#334155">bot token 발급/reset</text>
    <text x="406" y="338" font-size="15" fill="#334155">Git 저장소에 넣지 않기</text>

    <rect x="676" y="226" width="246" height="160" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="708" y="270" font-size="20" font-weight="900" fill="#9a3412">3. Intent</text>
    <text x="708" y="310" font-size="15" fill="#334155">Message Content 필요 여부</text>
    <text x="708" y="338" font-size="15" fill="#334155">slash command면 좁게 시작</text>

    <rect x="374" y="438" width="548" height="118" rx="22" fill="#f0fdf4" stroke="#86efac"/>
    <text x="406" y="482" font-size="20" font-weight="900" fill="#166534">4. OAuth2 / Installation</text>
    <text x="406" y="520" font-size="15" fill="#334155">Send Messages, Read Message History, slash command에 필요한 최소 권한만 선택한다.</text>
  </g>

  <g stroke="#94a3b8" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M320 306h52"/>
    <path d="M622 306h52"/>
    <path d="M800 388v48"/>
    <path d="M498 388v48"/>
  </g>
  <g fill="#94a3b8">
    <path d="M368 298l12 8-12 8z"/>
    <path d="M670 298l12 8-12 8z"/>
    <path d="M792 432l8 12 8-12z"/>
    <path d="M490 432l8 12 8-12z"/>
  </g>

  <rect x="72" y="586" width="1056" height="44" rx="16" fill="#fef2f2" stroke="#fecaca"/>
  <text x="102" y="614" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#991b1b">주의</text>
  <text x="160" y="614" font-family="Arial, sans-serif" font-size="16" fill="#334155">처음에는 관리자 권한을 주지 않는다. DM pairing 또는 mention-required 상태로 시작한다.</text>
</svg>
